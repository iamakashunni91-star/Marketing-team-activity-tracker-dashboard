name: Update Dashboard

on:
  schedule:
    - cron: '0 * * * *'        # every hour, top of the hour (UTC) — dashboard refresh
    - cron: '30 06 * * 1-5'    # 06:30 UTC = 12:00 PM IST, Mon–Fri — daily missing-updates check
  workflow_dispatch:           # manual "Run workflow" button

permissions:
  contents: write              # allow committing the updated HTML back

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas openpyxl requests

      - name: Run dashboard updater
        env:
          SHAREPOINT_URL: ${{ secrets.SHAREPOINT_URL }}
        run: python dashboard.py

      - name: Commit and push if changed
        run: |
          git config user.name "Dashboard Bot"
          git config user.email "actions@github.com"
          git add index.html || true
          git add missing_yesterday.json || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-update dashboard $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi

      # ── Send the missing-updates email ──
      # Fires on the 12 PM IST schedule, AND on a manual run (for testing).
      - name: Send missing-updates email
        if: ${{ github.event.schedule == '30 06 * * 1-5' || github.event_name == 'workflow_dispatch' }}
        run: python send_missing_email.py
        env:
          SMTP_SERVER:   ${{ secrets.SMTP_SERVER }}
          SMTP_PORT:     ${{ secrets.SMTP_PORT }}
          SMTP_USER:     ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
